name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - "filler_hex.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pygame

      # Та же команда, что и в make_EXE.bat.
      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --windowed --name Filler_hex --noconfirm filler_hex.py

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Filler_hex — Windows build"
          make_latest: true
          files: dist/Filler_hex.exe
